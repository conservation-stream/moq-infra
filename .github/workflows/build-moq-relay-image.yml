name: Build and publish moq-relay image

on:
  push:
    paths:
      - docker/moq-relay/Dockerfile
      - .github/workflows/build-moq-relay-image.yml
  pull_request:
    paths:
      - docker/moq-relay/Dockerfile
      - .github/workflows/build-moq-relay-image.yml
  workflow_dispatch:
    inputs:
      moq_ref:
        description: Upstream moq git ref, tag, or commit SHA to build.
        required: true
        default: main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/moq-relay

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image names
        id: vars
        env:
          DISPATCH_MOQ_REF: ${{ github.event.inputs.moq_ref }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail
          moq_ref="${DISPATCH_MOQ_REF:-main}"
          safe_ref="$(printf '%s' "$moq_ref" | tr -c 'A-Za-z0-9_.-' '-' | sed 's/--*/-/g; s/^-//; s/-$//')"
          image_name="$(printf '%s/%s' "$REGISTRY" "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          image_tag="${safe_ref}-${GITHUB_SHA::12}"

          echo "moq_ref=$moq_ref" >> "$GITHUB_OUTPUT"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_name:$image_tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker/moq-relay
          file: docker/moq-relay/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.vars.outputs.image_ref }}
          build-args: |
            MOQ_REF=${{ steps.vars.outputs.moq_ref }}
            MOQ_PACKAGE=moq-relay
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.moq_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image summary
        if: github.event_name != 'pull_request'
        env:
          IMAGE_REF: ${{ steps.vars.outputs.image_ref }}
          IMAGE_NAME: ${{ steps.vars.outputs.image_name }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          MOQ_REF: ${{ steps.vars.outputs.moq_ref }}
        run: |
          set -euo pipefail
          {
            echo "## moq-relay image"
            echo
            echo "Published tag:"
            echo
            echo "\`${IMAGE_REF}\`"
            echo
            echo "Pinned Pulumi value:"
            echo
            echo "\`${IMAGE_NAME}@${IMAGE_DIGEST}\`"
            echo
            echo "Upstream moq ref: \`${MOQ_REF}\`"
            echo "Image tag: \`${IMAGE_TAG}\`"
          } >> "$GITHUB_STEP_SUMMARY"
